name: Release and Publish

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  release:
    uses: ImBit/bit-build/.github/publish.yml@main
    with:
      modules: "."
    secrets: inherit

  modrinth:
    name: Publish to Modrinth
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ needs.release.outputs.changelog }}
        run: ./gradlew modrinth modrinthSyncBody