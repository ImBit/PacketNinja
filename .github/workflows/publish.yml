name: Release and Publish

permissions:
    contents: write

on:
    workflow_dispatch:

jobs:
    build:
        name: Build Release
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Set up JDK 21
                uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'
                    cache: gradle

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Determine version
                id: determine-version
                run: |
                    VERSION=$(grep -E "^mod_version=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
                    MC_VERSION=$(grep -E "^minecraft_version=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')

                    if [ -z "$VERSION" ]; then
                      echo "Could not read version from gradle.properties"
                      exit 1
                    fi
                    if [ -z "$MC_VERSION" ]; then
                      echo "Could not read minecraft_version from gradle.properties"
                      exit 1
                    fi

                    echo "VERSION=$VERSION"       >> $GITHUB_ENV
                    echo "MC_VERSION=$MC_VERSION" >> $GITHUB_ENV

            -   name: Build with Gradle
                run: ./gradlew build --no-daemon --stacktrace

            -   name: Generate Changelog
                id: changelog
                run: |
                    export LC_ALL=C.UTF-8
                    export LANG=C.UTF-8

                    git fetch --tags --force

                    CURRENT_TAG="${{ env.VERSION }}"
                    PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -vx "$CURRENT_TAG" | head -n1)

                    if [ -z "$PREVIOUS_TAG" ]; then
                      echo "## ЁЯЪА Initial Release $CURRENT_TAG" > changelog.md
                      echo "" >> changelog.md
                      echo "This is the first official release." >> changelog.md
                    else
                      echo "## ЁЯЪА Release $CURRENT_TAG" > changelog.md
                      echo "" >> changelog.md

                      git log --pretty=format:"%s (%h)" "$PREVIOUS_TAG"..HEAD > all_commits.txt

                      FEATURES=$(grep -E "^(тЬи|:sparkles:)" all_commits.txt || true)
                      if [ ! -z "$FEATURES" ]; then
                        echo "### тЬи Features" >> changelog.md
                        echo "$FEATURES" | sed -E 's/^(тЬи|:sparkles:) /\* /' >> changelog.md
                        echo "" >> changelog.md
                      fi

                      BUGFIXES=$(grep -E "^(ЁЯРЫ|:bug:)" all_commits.txt || true)
                      if [ ! -z "$BUGFIXES" ]; then
                        echo "### ЁЯРЫ Bug Fixes" >> changelog.md
                        echo "$BUGFIXES" | sed -E 's/^(ЁЯРЫ|:bug:) /\* /' >> changelog.md
                        echo "" >> changelog.md
                      fi

                      REFACTOR=$(grep -E "^(ЁЯОи|:art:)" all_commits.txt || true)
                      if [ ! -z "$REFACTOR" ]; then
                        echo "### ЁЯОи Refactors / Performance" >> changelog.md
                        echo "$REFACTOR" | sed -E 's/^(ЁЯОи|:art:) /\* /' >> changelog.md
                        echo "" >> changelog.md
                      fi

                      OTHER=$(grep -vE "^(тЬи|:sparkles:|ЁЯРЫ|:bug:|ЁЯОи|:art:|Merge)" all_commits.txt || true)
                      if [ ! -z "$OTHER" ]; then
                        echo "### ЁЯУж Other Changes" >> changelog.md
                        echo "$OTHER" | sed 's/^/\* /' >> changelog.md
                        echo "" >> changelog.md
                      fi

                      rm -f all_commits.txt
                    fi

                    cat changelog.md

                    CHANGELOG=$(cat changelog.md)
                    echo "changelog<<EOF" >> $GITHUB_OUTPUT
                    echo "$CHANGELOG"     >> $GITHUB_OUTPUT
                    echo "EOF"            >> $GITHUB_OUTPUT

            -   name: Locate primary JAR
                run: |
                    PRIMARY=$(ls build/libs/*.jar \
                      | grep -v "\-dev\." \
                      | grep -v "\-sources\." \
                      | grep -v "\-javadoc\." \
                      | head -n1)

                    if [ -z "$PRIMARY" ]; then
                      echo "Could not find primary JAR"
                      exit 1
                    fi
                    echo "PRIMARY_JAR=$PRIMARY" >> $GITHUB_ENV
                    echo "Found primary JAR: $PRIMARY"

            -   name: Create GitHub Release
                uses: softprops/action-gh-release@v1
                with:
                    tag_name: ${{ env.VERSION }}
                    name: Release ${{ env.VERSION }}
                    body: ${{ steps.changelog.outputs.changelog }}
                    draft: false
                    prerelease: false
                    files: |
                        build/libs/*.jar
                        LICENSE
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Publish to Modrinth
                env:
                    MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                    CHANGELOG: ${{ steps.changelog.outputs.changelog }}
                run: ./gradlew modrinth modrinthSyncBody

            -   name: Bump minor version
                run: |
                    CURRENT="${{ env.VERSION }}"
                    MAJOR=$(echo "$CURRENT" | cut -d'.' -f1)
                    MID=$(echo "$CURRENT" | cut -d'.' -f2)
                    MINOR=$(echo "$CURRENT" | cut -d'.' -f3)

                    NEW_MINOR=$((MINOR + 1))
                    NEW_VERSION="$MAJOR.$MID.$NEW_MINOR"

                    sed -i "s/^mod_version=.*/mod_version=$NEW_VERSION/" gradle.properties

                    echo "Bumped version: $CURRENT тЖТ $NEW_VERSION"
                    echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

            -   name: Commit version bump
                run: |
                    git config user.name  "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git add gradle.properties
                    git commit -m "ЁЯП╖я╕П Bump version to ${{ env.NEW_VERSION }}"
                    git push